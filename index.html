<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>省级数据仓库评估系统</title>
    
    <!-- 引入高品质中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- 全局与业务样式 -->
    <link rel="stylesheet" href="src/css/style.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: #f5f5f5;
            -webkit-font-smoothing: antialiased;
        }

        noscript {
            display: block;
            padding: 12px 16px;
            text-align: center;
            background: #fffbe6;
            color: #d48806;
            font-size: 14px;
            border-bottom: 1px solid #ffe58f;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sk-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sk-sidebar {
            width: 240px;
            background: #fff;
            padding: 16px 8px;
            border-right: 1px solid #f0f0f0;
        }
        .sk-sidebar-logo {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f0f0f0;
            margin: 0 12px 12px;
        }
        .sk-sidebar-logo-bar {
            width: 120px;
            height: 20px;
            background: #f0f0f0;
            border-radius: 4px;
        }
        .sk-menu-item {
            height: 36px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .sk-main {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .sk-title {
            width: 200px;
            height: 28px;
            background: #e8e8e8;
            border-radius: 6px;
        }
        .sk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .sk-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            height: 160px;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sk-line {
            height: 14px;
            background: #f0f0f0;
            border-radius: 4px;
        }
        .sk-line.short { width: 35%; height: 18px; margin-bottom: 4px; }
        .sk-line.medium { width: 65%; }
        .sk-line.long { width: 100%; }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent 0, rgba(0,0,0,0.04) 20%, rgba(0,0,0,0.05) 60%, transparent);
            animation: shimmer 1.5s infinite ease-out;
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @media (max-width: 768px) {
            .sk-sidebar { display: none; }
            .sk-main { padding: 16px; }
            .sk-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <noscript>
        <strong>非常抱歉，省级数据仓库评估系统需要启用 JavaScript 才能完整呈现。请在浏览器设置中开启 JavaScript。</strong>
    </noscript>

    <!-- 应用挂载点与骨架屏 -->
    <div id="app">
        <div class="sk-body">
            <aside class="sk-sidebar">
                <div class="sk-sidebar-logo">
                    <div class="sk-sidebar-logo-bar shimmer"></div>
                </div>
                <div class="sk-menu-item shimmer"></div>
                <div class="sk-menu-item shimmer" style="width: 85%;"></div>
                <div class="sk-menu-item shimmer" style="width: 90%;"></div>
                <div class="sk-menu-item shimmer" style="width: 75%;"></div>
                <div class="sk-menu-item shimmer" style="width: 80%;"></div>
            </aside>
            <main class="sk-main">
                <div class="sk-title shimmer"></div>
                <div class="sk-grid">
                    <div class="sk-card">
                        <div class="sk-line short shimmer"></div>
                        <div class="sk-line long shimmer"></div>
                        <div class="sk-line medium shimmer"></div>
                        <div class="sk-line long shimmer" style="margin-top:auto;"></div>
                    </div>
                    <div class="sk-card">
                        <div class="sk-line short shimmer"></div>
                        <div class="sk-line long shimmer"></div>
                        <div class="sk-line medium shimmer"></div>
                        <div class="sk-line long shimmer" style="margin-top:auto;"></div>
                    </div>
                    <div class="sk-card">
                        <div class="sk-line short shimmer"></div>
                        <div class="sk-line long shimmer"></div>
                        <div class="sk-line medium shimmer"></div>
                        <div class="sk-line long shimmer" style="margin-top:auto;"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 业务脚本严格按序加载 -->
    <script src="src/js/router.js" defer></script>
    <script src="src/js/api.js" defer></script>
    <script src="src/js/app.js" defer></script>
</body>
</html>
